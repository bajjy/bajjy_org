# Local Docker compose. Coolify can use this as the deploy spec, or build
# the Dockerfile directly — both are supported.

services:
  web:
    build: .
    image: bajjy-org:latest
    container_name: bajjy_org
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      GITHUB_USERNAME: ${GITHUB_USERNAME:-bajjy}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_CACHE_TTL_SECONDS: ${GITHUB_CACHE_TTL_SECONDS:-900}
      SITE_ORIGIN: ${SITE_ORIGIN:-https://bajjy.org}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
